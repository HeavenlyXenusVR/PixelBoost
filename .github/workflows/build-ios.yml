name: Build iOS IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      configuration:
        description: 'Build configuration'
        required: false
        default: 'Release'
        type: choice
        options: [ Release, Debug ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build & export IPA
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          XCODE=$(ls /Applications | grep '^Xcode' | sort -rV | head -1)
          sudo xcode-select -s "/Applications/$XCODE/Contents/Developer"

      - name: Print Xcode version
        run: xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build configuration
        id: config
        run: |
          CONFIG="${{ github.event.inputs.configuration || 'Release' }}"
          echo "configuration=$CONFIG" >> "$GITHUB_OUTPUT"

      - name: Archive (unsigned)
        env:
          # Injected as a build setting (-> Info.plist's UpscalerBridgeAPIKey
          # via $(UPSCALER_BRIDGE_API_KEY) substitution, see project.yml) —
          # never written to a file in the repo, only passed on this
          # command line from the encrypted repo secret.
          UPSCALER_BRIDGE_API_KEY: ${{ secrets.UPSCALER_BRIDGE_API_KEY }}
        run: |
          mkdir -p build
          xcodebuild archive \
            -project PixelBoost.xcodeproj \
            -scheme PixelBoost \
            -configuration ${{ steps.config.outputs.configuration }} \
            -destination "generic/platform=iOS" \
            -archivePath build/PixelBoost.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            SKIP_INSTALL=NO \
            "UPSCALER_BRIDGE_API_KEY=$UPSCALER_BRIDGE_API_KEY" 2>&1 | tee /tmp/xcodebuild.log | tail -20
          if grep -q "error:" /tmp/xcodebuild.log; then
            echo "--- Compiler errors ---"
            grep "error:" /tmp/xcodebuild.log | head -30
          fi
          APP=$(find build/PixelBoost.xcarchive -name "*.app" | head -1)
          if [ -z "$APP" ]; then
            echo "::error::Archive did not produce a .app bundle"
            exit 1
          fi
          echo "APP_PATH=$APP" >> "$GITHUB_ENV"

      - name: Compile asset catalogs (actool)
        run: |
          APP="$APP_PATH"
          xcrun actool \
            --output-format human-readable-text \
            --notices \
            --warnings \
            --platform iphoneos \
            --minimum-deployment-target 16.0 \
            --target-device iphone \
            --target-device ipad \
            --app-icon AppIcon \
            --output-partial-info-plist /tmp/assetcatalog_output.plist \
            --compress-pngs \
            --compile "$APP" \
            "PixelBoost/Resources/Assets.xcassets"
          echo "Assets.car: $(du -sh "$APP/Assets.car" 2>/dev/null || echo MISSING)"

      - name: Package IPA (unsigned)
        run: |
          MARKETING_VERSION=$(grep 'MARKETING_VERSION' project.yml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          IPA_NAME="PixelBoost-v${MARKETING_VERSION}-unsigned.ipa"
          PAYLOAD_DIR="build/Payload/Payload"
          mkdir -p "$PAYLOAD_DIR"
          cp -R "$APP_PATH" "$PAYLOAD_DIR/"
          cd build/Payload
          zip -r "../$IPA_NAME" Payload/ -x "*.DS_Store"
          echo "IPA created: $(du -sh ../$IPA_NAME)"
          echo "IPA_NAME=$IPA_NAME" >> "$GITHUB_ENV"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: PixelBoost-unsigned-ipa
          path: build/${{ env.IPA_NAME }}
          retention-days: 14

      - name: Upload archive (for re-signing)
        uses: actions/upload-artifact@v4
        with:
          name: PixelBoost-xcarchive
          path: build/PixelBoost.xcarchive
          retention-days: 7
