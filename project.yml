name: PixelBoost

options:
  bundleIdPrefix: com.pixelboost
  deploymentTarget:
    iOS: "17.0"

configs:
  Debug: debug
  Release: release

settings:
  base:
    SWIFT_VERSION: "5.10"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    MARKETING_VERSION: "3.17.0"
    CURRENT_PROJECT_VERSION: "1"
    ENABLE_BITCODE: "NO"
  configs:
    Debug:
      SWIFT_OPTIMIZATION_LEVEL: "-Onone"
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
    Release:
      SWIFT_OPTIMIZATION_LEVEL: "-O"
      VALIDATE_PRODUCT: "YES"

targets:
  PixelBoost:
    type: application
    platform: iOS
    dependencies:
      - target: PixelBoostShare
        embed: true
    sources:
      - path: PixelBoost/Sources
      # Drop a RealESRGAN*.mlmodel/.mlpackage (or your own converted model)
      # into Models/ and Xcode compiles it to .mlmodelc and bundles it
      # automatically — .mlmodel/.mlpackage must go under `sources:` (not
      # `resources:`) for Xcode's Core ML compiler build step to run at all;
      # under `resources:` it would just copy the raw, uncompiled model.
      # See Models/README.md for how to get one.
      #
      # excludes the docs/scripts sitting alongside the model: Xcode's
      # bundle-copy step flattens directory structure, so Models/README.md
      # and Models/convert/README.md would otherwise both land at
      # PixelBoost.app/README.md and the archive fails with "Multiple
      # commands produce ... README.md".
      - path: Models
        excludes:
          - "*.md"
          - "convert/**"
    resources:
      - path: PixelBoost/Resources/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pixelboost.ios
        INFOPLIST_FILE: PixelBoost/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        # Empty by default — local/dev builds get no key, and ServerConfig.apiKey
        # falls back to nil (no Authorization header sent, matching a server
        # with no API key configured). CI overrides this on the xcodebuild
        # command line from the UPSCALER_BRIDGE_API_KEY repo secret so
        # CI-built IPAs have it baked in; the raw value never touches a file
        # in this repo.
        UPSCALER_BRIDGE_API_KEY: ""
    entitlements:
      path: PixelBoost/Resources/PixelBoost.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.pixelboost.shared
        com.apple.developer.ubiquity-kvstore-identifier: "$(TeamIdentifierPrefix)$(CFBundleIdentifier)"
    scheme:
      buildAction:
        targets:
          - PixelBoost
      runAction:
        config: Debug
      archiveAction:
        config: Release

  # Minimal share-in extension — lets another app's share sheet (Photos,
  # Safari, Files, etc.) hand a single image to PixelBoost. There's no
  # in-process link between an extension and its host app, so it can't
  # jump straight into the editor; it just drops the image into a shared
  # App Group container (see Sources/Shared/SharedPhotoBridge.swift) and
  # the main app picks it up the next time it becomes active. Deliberately
  # kept to the system-provided SLComposeServiceViewController UI (no
  # storyboard, no custom screen) — an extension's host-app lifecycle
  # can't be exercised without a device/simulator, so this leans on the
  # most standard, longest-stable API surface available rather than a
  # custom interface that can't be visually checked before shipping.
  PixelBoostShare:
    type: app-extension
    platform: iOS
    sources:
      - path: PixelBoostShare/Sources
      - path: PixelBoost/Sources/Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pixelboost.ios.share
        INFOPLIST_FILE: PixelBoostShare/Info.plist
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        SKIP_INSTALL: YES
    entitlements:
      path: PixelBoostShare/PixelBoostShare.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.pixelboost.shared
